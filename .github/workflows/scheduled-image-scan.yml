name: Scheduled image scan

on:
  schedule:
    - cron: "43 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-image-scan
  cancel-in-progress: true

jobs:
  image-scan:
    name: Production image security scan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      RAILWAY_GIT_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java trivy
          cache: true

      - name: Build the current production image
        run: mise run docker-build

      - name: Generate SBOM and scan current vulnerabilities
        run: mise run image-scan

      - name: Upload scan records
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: scheduled-production-image-scan-${{ github.sha }}-${{ github.run_attempt }}
          path: |
            .build/image-scan/shared-calendar-image.cdx.json
            .build/image-scan/shared-calendar-vulnerabilities.json
          if-no-files-found: ignore
          retention-days: 14
