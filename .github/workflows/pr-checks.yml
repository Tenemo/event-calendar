name: PR checks

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  build:
    name: maven build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test WAR
        run: ./mvnw -B -ntp clean package

  end-to-end:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build WAR for Liberty
        run: ./mvnw -B -ntp package

      - name: Start PostgreSQL
        run: java scripts/calendar-tool.java db

      - name: Install Playwright browsers and Linux dependencies
        run: |
          ./mvnw -B -ntp \
            -Dexec.classpathScope=test \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            "-Dexec.args=install --with-deps" \
            org.codehaus.mojo:exec-maven-plugin:3.6.3:java

      - name: Start Open Liberty
        run: |
          ./mvnw -B -ntp liberty:dev > target/liberty-dev.log 2>&1 &
          echo "$!" > target/liberty-dev.pid

      - name: Wait for Open Liberty
        run: java scripts/calendar-tool.java wait-for-app

      - name: Verify Flyway schema
        run: |
          docker compose exec -T postgres psql -U calendar -d calendar -c '\dt'
          docker compose exec -T postgres psql -U calendar -d calendar -c 'select installed_rank, version, description, success from flyway_schema_history order by installed_rank;'

      - name: Run Playwright end-to-end tests
        env:
          APP_BASE_URL: http://localhost:9080
          BROWSER: chromium
        run: ./mvnw -B -ntp -Pe2e failsafe:integration-test failsafe:verify

      - name: Show Open Liberty logs on failure
        if: failure()
        run: |
          if [ -f target/liberty-dev.log ]; then
            cat target/liberty-dev.log
          fi
          if [ -f target/liberty/wlp/usr/servers/defaultServer/logs/messages.log ]; then
            cat target/liberty/wlp/usr/servers/defaultServer/logs/messages.log
          fi

  production-image:
    name: production container smoke
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_BASE_URL: http://localhost:9080
      COOKIE_SECURE: "false"
      PORT: "9080"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Build production image
        run: docker build --tag shared-calendar:local .

      - name: Start production container and PostgreSQL
        run: docker compose --profile application up -d --no-build web

      - name: Wait for production container
        run: java scripts/calendar-tool.java wait-for-app

      - name: Verify stable routes and migrations
        run: |
          curl --fail --silent --show-error http://localhost:9080/health | grep -qx ok
          curl --fail --silent --show-error http://localhost:9080/ > /dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:9080/calendar/not-a-valid-calendar-token)" = "404"
          docker compose exec -T postgres psql -U calendar -d calendar -c '\dt'
          docker compose exec -T postgres psql -U calendar -d calendar -c 'select installed_rank, version, description, success from flyway_schema_history order by installed_rank;'

      - name: Show production container logs on failure
        if: failure()
        run: docker compose --profile application logs --no-color web postgres
