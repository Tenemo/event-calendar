name: PR checks

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PRODUCTION_IMAGE_NAME: shared-calendar:local

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java node actionlint shellcheck
          cache: true

      - name: Restore Maven dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}

      - name: Lint GitHub Actions workflows
        run: mise run lint-workflows

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Test repository tooling
        run: |
          mise run tooling-self-test
          java scripts/verify-production-deployment.java self-test

      - name: Run static analysis
        run: mise run static-analysis

      - name: Upload static-analysis diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: static-analysis-diagnostics-${{ github.run_attempt }}
          path: |
            .build/package/checkstyle-*.xml
            .build/package/spotbugs*.xml
          if-no-files-found: ignore
          retention-days: 7

  css-lint:
    name: CSS lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java node
          cache: true

      - name: Restore npm download cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Lint stylesheets
        run: mise run lint-css

  build:
    name: Maven build
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Restore Maven dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test WAR
        run: mise run package

      - name: Upload WAR and build-specific SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: maven-build-${{ github.sha }}
          path: |
            .build/package/*.war
            .build/package/bom.json
            .build/package/bom.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload unit-test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: unit-test-diagnostics-${{ github.run_attempt }}
          path: .build/package/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 7

  reproducible-build:
    name: Reproducible WAR
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Restore Maven dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Verify reproducible production archive
        run: mise run verify-reproducible-build

  production-image:
    name: Build production image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: build
    env:
      RAILWAY_GIT_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Build production image once
        run: mise run docker-build

      - name: Export exact production image
        run: |
          set -euo pipefail
          mkdir -p .build/production-image
          docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME" > .build/production-image/image-id.txt
          docker image save "$PRODUCTION_IMAGE_NAME" | gzip --best > .build/production-image/shared-calendar-image.tar.gz

      - name: Upload exact production image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: production-image-${{ github.sha }}
          path: .build/production-image
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  end-to-end:
    name: Playwright end-to-end (Chromium)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: production-image
    env:
      BROWSER: chromium
      E2E_ARTIFACTS_DIRECTORY: .build/e2e-artifacts/chromium

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Restore Maven dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Download exact production image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-image-${{ github.sha }}
          path: .build/production-image

      - name: Load and verify exact production image
        run: |
          docker image load --input .build/production-image/shared-calendar-image.tar.gz
          expected_image_id="$(tr -d '\r\n' < .build/production-image/image-id.txt)"
          actual_image_id="$(docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME")"
          test "$actual_image_id" = "$expected_image_id"

      - name: Run shared-calendar browser workflows
        run: java scripts/calendar-tool.java e2e-shared

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: e2e-chromium-diagnostics-${{ github.run_attempt }}
          path: |
            .build/e2e-artifacts/**
            .build/package/failsafe-reports/**
            .build/verification/**
          if-no-files-found: ignore
          retention-days: 7

  cross-browser-smoke:
    name: Cross-browser smoke (${{ matrix.browser }})
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: production-image
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    env:
      BROWSER: ${{ matrix.browser }}
      E2E_ARTIFACTS_DIRECTORY: .build/e2e-artifacts/${{ matrix.browser }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Restore Maven dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Download exact production image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-image-${{ github.sha }}
          path: .build/production-image

      - name: Load and verify exact production image
        run: |
          docker image load --input .build/production-image/shared-calendar-image.tar.gz
          expected_image_id="$(tr -d '\r\n' < .build/production-image/image-id.txt)"
          actual_image_id="$(docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME")"
          test "$actual_image_id" = "$expected_image_id"

      - name: Run focused cross-browser workflows
        run: java scripts/calendar-tool.java e2e-cross-browser-smoke

      - name: Upload cross-browser diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: e2e-${{ matrix.browser }}-diagnostics-${{ github.run_attempt }}
          path: |
            .build/e2e-artifacts/**
            .build/package/failsafe-reports/**
            .build/verification/**
          if-no-files-found: ignore
          retention-days: 7

  bootstrap-registration:
    name: Bootstrap registration concurrency
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: production-image
    env:
      BROWSER: chromium
      E2E_ARTIFACTS_DIRECTORY: .build/e2e-artifacts/bootstrap-registration

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Restore Maven dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Download exact production image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-image-${{ github.sha }}
          path: .build/production-image

      - name: Load and verify exact production image
        run: |
          docker image load --input .build/production-image/shared-calendar-image.tar.gz
          expected_image_id="$(tr -d '\r\n' < .build/production-image/image-id.txt)"
          actual_image_id="$(docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME")"
          test "$actual_image_id" = "$expected_image_id"

      - name: Verify atomic bootstrap registration
        run: java scripts/calendar-tool.java verify-bootstrap-registration --reuse-image

      - name: Upload bootstrap-registration diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: bootstrap-registration-diagnostics-${{ github.run_attempt }}
          path: |
            .build/e2e-artifacts/**
            .build/package/failsafe-reports/**
            .build/verification/**
          if-no-files-found: ignore
          retention-days: 7

  production-smoke:
    name: Production container smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: production-image
    env:
      APP_BASE_URL: http://localhost:9080
      EXPECTED_DEPLOYMENT_REVISION: ${{ github.sha }}
      PORT: "9080"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Download exact production image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-image-${{ github.sha }}
          path: .build/production-image

      - name: Load and verify exact production image
        run: |
          docker image load --input .build/production-image/shared-calendar-image.tar.gz
          expected_image_id="$(tr -d '\r\n' < .build/production-image/image-id.txt)"
          actual_image_id="$(docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME")"
          test "$actual_image_id" = "$expected_image_id"

      - name: Start production container and PostgreSQL
        run: docker compose --profile application up -d --no-build web

      - name: Wait for production container
        run: java scripts/calendar-tool.java wait-for-app

      - name: Verify artifact revision, stable routes, and migrations
        run: |
          java scripts/calendar-tool.java verify-local
          java scripts/verify-production-deployment.java \
            --base-url "$APP_BASE_URL" \
            --expected-revision "$EXPECTED_DEPLOYMENT_REVISION" \
            --timeout-seconds 30 \
            --poll-interval-seconds 1
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:9080/AAAAAAAAAAA)" = "404"

      - name: Save production container logs on failure
        if: failure()
        run: |
          mkdir -p .build/ci-diagnostics
          docker compose --profile application logs --no-color web postgres > .build/ci-diagnostics/production-container.log

      - name: Upload production container diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: production-container-diagnostics-${{ github.run_attempt }}
          path: |
            .build/ci-diagnostics/**
            .build/verification/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop isolated production containers
        if: always()
        run: docker compose --profile application down --volumes --remove-orphans

  image-scan:
    name: Production image vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: production-image

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java trivy
          cache: true

      - name: Download exact production image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-image-${{ github.sha }}
          path: .build/production-image

      - name: Load and verify exact production image
        run: |
          docker image load --input .build/production-image/shared-calendar-image.tar.gz
          expected_image_id="$(tr -d '\r\n' < .build/production-image/image-id.txt)"
          actual_image_id="$(docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME")"
          test "$actual_image_id" = "$expected_image_id"

      - name: Scan production image
        run: |
          set -euo pipefail
          mkdir -p .build/ci-diagnostics
          mise run image-scan 2>&1 | tee .build/ci-diagnostics/image-scan.log

      - name: Upload build-specific image security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: production-image-security-${{ github.sha }}
          path: |
            .build/image-scan/shared-calendar-image.cdx.json
            .build/image-scan/shared-calendar-vulnerabilities.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload image-scan diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: image-scan-diagnostics-${{ github.run_attempt }}
          path: .build/ci-diagnostics/**
          if-no-files-found: ignore
          retention-days: 7

  backup-restore:
    name: PostgreSQL backup and restore
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: production-image

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Download exact production image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-image-${{ github.sha }}
          path: .build/production-image

      - name: Load and verify exact production image
        run: |
          expected_image_id="$(tr -d '\r\n' < .build/production-image/image-id.txt)"
          docker image load --input .build/production-image/shared-calendar-image.tar.gz
          actual_image_id="$(docker image inspect --format '{{.Id}}' "$PRODUCTION_IMAGE_NAME")"
          test "$actual_image_id" = "$expected_image_id"

      - name: Initialize clean source database and verify backup and restore
        run: |
          set -euo pipefail
          mkdir -p .build/ci-diagnostics
          mise run verify-backup-restore 2>&1 | tee .build/ci-diagnostics/backup-restore.log

      - name: Upload backup and restore diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: backup-restore-diagnostics-${{ github.run_attempt }}
          path: |
            .build/ci-diagnostics/**
            .build/verification/**
          if-no-files-found: ignore
          retention-days: 7

  required-pr-checks:
    name: Required PR checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always()
    needs:
      - dependency-review
      - static-analysis
      - css-lint
      - build
      - reproducible-build
      - production-image
      - end-to-end
      - cross-browser-smoke
      - bootstrap-registration
      - production-smoke
      - image-scan
      - backup-restore
    env:
      DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
      STATIC_ANALYSIS_RESULT: ${{ needs.static-analysis.result }}
      CSS_LINT_RESULT: ${{ needs.css-lint.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      REPRODUCIBLE_BUILD_RESULT: ${{ needs.reproducible-build.result }}
      PRODUCTION_IMAGE_RESULT: ${{ needs.production-image.result }}
      END_TO_END_RESULT: ${{ needs.end-to-end.result }}
      CROSS_BROWSER_SMOKE_RESULT: ${{ needs.cross-browser-smoke.result }}
      BOOTSTRAP_REGISTRATION_RESULT: ${{ needs.bootstrap-registration.result }}
      PRODUCTION_SMOKE_RESULT: ${{ needs.production-smoke.result }}
      IMAGE_SCAN_RESULT: ${{ needs.image-scan.result }}
      BACKUP_RESTORE_RESULT: ${{ needs.backup-restore.result }}

    steps:
      - name: Require every merge gate to pass
        run: |
          set -euo pipefail
          failed_job_count=0

          require_success() {
            job_name="$1"
            job_result="$2"
            if [ "$job_result" != "success" ]; then
              echo "::error::$job_name finished with result: $job_result"
              failed_job_count=$((failed_job_count + 1))
            fi
          }

          require_success "Dependency review" "$DEPENDENCY_REVIEW_RESULT"
          require_success "Static analysis" "$STATIC_ANALYSIS_RESULT"
          require_success "CSS lint" "$CSS_LINT_RESULT"
          require_success "Maven build" "$BUILD_RESULT"
          require_success "Reproducible WAR" "$REPRODUCIBLE_BUILD_RESULT"
          require_success "Production image build" "$PRODUCTION_IMAGE_RESULT"
          require_success "Playwright end-to-end" "$END_TO_END_RESULT"
          require_success "Cross-browser smoke matrix" "$CROSS_BROWSER_SMOKE_RESULT"
          require_success "Bootstrap registration concurrency" "$BOOTSTRAP_REGISTRATION_RESULT"
          require_success "Production container smoke" "$PRODUCTION_SMOKE_RESULT"
          require_success "Production image vulnerability scan" "$IMAGE_SCAN_RESULT"
          require_success "PostgreSQL backup and restore" "$BACKUP_RESTORE_RESULT"

          if [ "$failed_job_count" -ne 0 ]; then
            exit 1
          fi

          echo "Every required PR check passed."
