name: PR checks

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  build:
    name: Maven build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test WAR
        run: ./mvnw -B -ntp clean package

  end-to-end:
    name: Playwright end-to-end
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run isolated Playwright workflows
        env:
          BROWSER: chromium
        run: java scripts/calendar-tool.java e2e

  production-image:
    name: Production container smoke
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_BASE_URL: http://localhost:9080
      PORT: "9080"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Build production image
        run: java scripts/calendar-tool.java docker-build

      - name: Start production container and PostgreSQL
        run: docker compose --profile application up -d --no-build web

      - name: Wait for production container
        run: java scripts/calendar-tool.java wait-for-app

      - name: Verify stable routes and migrations
        run: |
          java scripts/calendar-tool.java verify-local
          curl --fail --silent --show-error http://localhost:9080/ > /dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:9080/AAAAAAAAAAA)" = "404"

      - name: Show production container logs on failure
        if: failure()
        run: docker compose --profile application logs --no-color web postgres
