x-application-health-timeout: &application-health-timeout 5s
x-application-health-command: &application-health-command
  ["CMD-SHELL", "response=\"$$(curl --fail --silent http://localhost:9080/health)\" && [ \"$$response\" = \"ok\" ]"]

services:
  postgres:
    image: postgres:17.10@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
    environment:
      POSTGRES_DB: ${PGDATABASE:-calendar}
      POSTGRES_USER: ${PGUSER:-calendar}
      POSTGRES_PASSWORD: ${PGPASSWORD:-calendar}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - calendar_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    profiles: [application]
    image: shared-calendar:local
    build:
      context: .
      args:
        RAILWAY_GIT_COMMIT_SHA: ${RAILWAY_GIT_COMMIT_SHA:-}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 9080
      HTTPS_PORT: 9443
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-calendar}
      PGUSER: ${PGUSER:-calendar}
      PGPASSWORD: ${PGPASSWORD:-calendar}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Warsaw}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost:9443}
      APP_LTPA_KEYS_PASSWORD: ${APP_LTPA_KEYS_PASSWORD:-local-development-only}
      APP_BOOTSTRAP_INVITE_TOKEN: ${APP_BOOTSTRAP_INVITE_TOKEN:-}
    ports:
      - "${PORT:-9080}:9080"
      - "${HTTPS_PORT:-9443}:9443"
    healthcheck:
      test: *application-health-command
      interval: 10s
      timeout: *application-health-timeout
      retries: 12
      start_period: 30s

  postgres-restore-verification:
    profiles: [restore-verification]
    image: postgres:17.10@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
    environment:
      POSTGRES_DB: calendar_restore
      POSTGRES_USER: calendar_restore
      POSTGRES_PASSWORD: calendar_restore
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_restore -d calendar_restore"]
      interval: 2s
      timeout: 5s
      retries: 30

  postgres-bootstrap-verification:
    profiles: [bootstrap-verification]
    image: postgres:17.10@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
    environment:
      POSTGRES_DB: calendar_bootstrap_verification
      POSTGRES_USER: calendar_bootstrap_verification
      POSTGRES_PASSWORD: calendar_bootstrap_verification
    ports:
      - "127.0.0.1:${BOOTSTRAP_VERIFICATION_DATABASE_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_bootstrap_verification -d calendar_bootstrap_verification"]
      interval: 2s
      timeout: 5s
      retries: 30

  postgres-e2e-verification:
    profiles: [e2e-verification]
    image: postgres:17.10@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
    environment:
      POSTGRES_DB: calendar_e2e_verification
      POSTGRES_USER: calendar_e2e_verification
      POSTGRES_PASSWORD: calendar_e2e_verification
    ports:
      - "127.0.0.1:${E2E_VERIFICATION_DATABASE_PORT:-55433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_e2e_verification -d calendar_e2e_verification"]
      interval: 2s
      timeout: 5s
      retries: 30

  web-e2e-verification:
    profiles: [e2e-verification]
    image: shared-calendar:local
    depends_on:
      postgres-e2e-verification:
        condition: service_healthy
    environment:
      PORT: 9080
      HTTPS_PORT: 9443
      PGHOST: postgres-e2e-verification
      PGPORT: 5432
      PGDATABASE: calendar_e2e_verification
      PGUSER: calendar_e2e_verification
      PGPASSWORD: calendar_e2e_verification
      APP_TIMEZONE: Europe/Warsaw
      APP_BASE_URL: ${E2E_VERIFICATION_BASE_URL:-https://localhost:9445}
      APP_LTPA_KEYS_PASSWORD: e2e-verification-only
      APP_BOOTSTRAP_INVITE_TOKEN: ""
    ports:
      - "127.0.0.1:${E2E_VERIFICATION_APPLICATION_PORT:-9082}:9080"
      - "127.0.0.1:${E2E_VERIFICATION_HTTPS_PORT:-9445}:9443"
    healthcheck:
      test: *application-health-command
      interval: 2s
      timeout: *application-health-timeout
      retries: 30
      start_period: 30s

  web-bootstrap-verification:
    profiles: [bootstrap-verification]
    image: shared-calendar:local
    depends_on:
      postgres-bootstrap-verification:
        condition: service_healthy
    environment:
      PORT: 9080
      HTTPS_PORT: 9443
      PGHOST: postgres-bootstrap-verification
      PGPORT: 5432
      PGDATABASE: calendar_bootstrap_verification
      PGUSER: calendar_bootstrap_verification
      PGPASSWORD: calendar_bootstrap_verification
      APP_TIMEZONE: Europe/Warsaw
      APP_BASE_URL: https://localhost:${BOOTSTRAP_VERIFICATION_HTTPS_PORT:-9444}
      APP_LTPA_KEYS_PASSWORD: bootstrap-verification-only
      APP_BOOTSTRAP_INVITE_TOKEN: ${BOOTSTRAP_VERIFICATION_INVITATION_TOKEN:-bootstrap-verification-only-token-00000000000000000000000000000000}
    ports:
      - "127.0.0.1:${BOOTSTRAP_VERIFICATION_APPLICATION_PORT:-9081}:9080"
      - "127.0.0.1:${BOOTSTRAP_VERIFICATION_HTTPS_PORT:-9444}:9443"
    healthcheck:
      test: *application-health-command
      interval: 2s
      timeout: *application-health-timeout
      retries: 30
      start_period: 30s

volumes:
  calendar_postgres:
