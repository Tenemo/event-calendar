services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
    ports:
      - "5432:5432"
    volumes:
      - calendar_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar -d calendar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  calendar_postgres:
