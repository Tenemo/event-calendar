services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${PGDATABASE:-calendar}
      POSTGRES_USER: ${PGUSER:-calendar}
      POSTGRES_PASSWORD: ${PGPASSWORD:-calendar}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - calendar_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  calendar_postgres:
