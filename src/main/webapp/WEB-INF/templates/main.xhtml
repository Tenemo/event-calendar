<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      lang="en">
<h:head>
    <title><ui:insert name="title">Shared calendar</ui:insert></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/svg+xml" sizes="any" href="#{resource['images/favicon.svg']}"/>
    <ui:insert name="head"/>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<h:body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header class="app-header">
        <div>
            <h:outputLink value="#{request.contextPath}/" styleClass="app-brand">Shared calendar</h:outputLink>
            <p class="app-subtitle">Events for friends, clubs, and group plans.</p>
        </div>
        <nav class="app-nav" aria-label="Main navigation">
            <h:outputLink value="#{request.contextPath}/">Home</h:outputLink>
            <h:outputLink value="#{request.contextPath}/app/calendars" rendered="#{currentUser.signedIn}">My calendars</h:outputLink>
            <h:outputLink value="#{request.contextPath}/app/invitations" rendered="#{currentUser.signedIn}">Invitations</h:outputLink>
            <h:outputLink value="#{request.contextPath}/app/account-settings" rendered="#{currentUser.signedIn}">Account settings</h:outputLink>
            <h:outputLink value="#{request.contextPath}/login" rendered="#{not currentUser.signedIn}">Sign in</h:outputLink>
            <h:form styleClass="nav-form" rendered="#{currentUser.signedIn}">
                <h:commandButton value="Sign out" action="#{logoutView.logout}" styleClass="nav-action link-button"/>
            </h:form>
        </nav>
    </header>

    <main id="main-content" class="app-main" tabindex="-1">
        <p:messages id="messages" showDetail="true" closable="true"/>
        <ui:insert name="content"/>
    </main>
    <script type="text/javascript">
        function focusElementByIdSuffix(idSuffix) {
            window.requestAnimationFrame(function () {
                var element = document.querySelector("[id$='" + idSuffix + "']");
                if (element) {
                    element.focus();
                }
            });
        }

        function focusAfterSuccessfulAjax(ajaxArguments, idSuffix) {
            if (ajaxArguments) {
                if (ajaxArguments.validationFailed) {
                    return;
                }
            }
            focusElementByIdSuffix(idSuffix);
        }

        function focusConfirmationCancelButton() {
            window.setTimeout(function () {
                var cancelButton = document.querySelector(".ui-confirmdialog-no");
                if (cancelButton) {
                    cancelButton.focus();
                }
            }, 0);
        }
    </script>
</h:body>
</html>
