<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
<h:head>
    <title><ui:insert name="title">Shared calendar</ui:insert></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <ui:insert name="head"/>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<h:body>
    <header class="app-header">
        <div>
            <h:link outcome="/index" value="Shared calendar" styleClass="app-brand"/>
            <p class="app-subtitle">Events for friends, clubs, and recurring plans.</p>
        </div>
        <nav class="app-nav" aria-label="Main navigation">
            <h:link outcome="/index" value="Home"/>
            <h:link outcome="/public-calendar" value="Public example"/>
            <h:link outcome="/app/calendars" value="My calendars"/>
            <h:link outcome="/login" value="Sign in"/>
            <h:link outcome="/register" value="Register" styleClass="nav-action"/>
        </nav>
    </header>

    <main class="app-main">
        <p:messages id="messages" showDetail="true" closable="true"/>
        <ui:insert name="content"/>
    </main>
</h:body>
</html>
