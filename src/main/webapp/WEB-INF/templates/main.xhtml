<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
<h:head>
    <title><ui:insert name="title">Shared calendar</ui:insert></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <ui:insert name="head"/>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<h:body>
    <header class="app-header">
        <div>
            <h:outputLink value="#{request.contextPath}/" styleClass="app-brand">Shared calendar</h:outputLink>
            <p class="app-subtitle">Events for friends, clubs, and recurring plans.</p>
        </div>
        <nav class="app-nav" aria-label="Main navigation">
            <h:outputLink value="#{request.contextPath}/">Home</h:outputLink>
            <h:outputLink value="#{request.contextPath}/public-calendar">Public example</h:outputLink>
            <h:outputLink value="#{request.contextPath}/app/calendars" rendered="#{currentUser.signedIn}">My calendars</h:outputLink>
            <h:outputLink value="#{request.contextPath}/login" rendered="#{not currentUser.signedIn}">Sign in</h:outputLink>
            <h:outputLink value="#{request.contextPath}/register" styleClass="nav-action" rendered="#{not currentUser.signedIn}">Register</h:outputLink>
            <h:outputLink value="#{request.contextPath}/logout" styleClass="nav-action" rendered="#{currentUser.signedIn}">Sign out</h:outputLink>
        </nav>
    </header>

    <main class="app-main">
        <p:messages id="messages" showDetail="true" closable="true"/>
        <ui:insert name="content"/>
    </main>
</h:body>
</html>
