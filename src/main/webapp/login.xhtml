<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/main.xhtml">
    <ui:define name="title">Sign in - Shared calendar</ui:define>

    <ui:define name="content">
        <section class="narrow-section">
            <p:panel header="Sign in" styleClass="surface-panel">
                <p:staticMessage severity="info"
                                 summary="Authentication is not enabled yet."
                                 detail="The sign-in workflow is part of the next milestone."/>
                <h:form styleClass="stacked-form">
                    <p:outputLabel for="username" value="Username"/>
                    <p:inputText id="username" disabled="true"/>

                    <p:outputLabel for="password" value="Password"/>
                    <p:password id="password" disabled="true" feedback="false"/>

                    <p:commandButton value="Sign in" disabled="true"/>
                </h:form>
            </p:panel>
        </section>
    </ui:define>
</ui:composition>
