<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/main.xhtml">
    <ui:define name="title">My calendars - Shared calendar</ui:define>

    <ui:define name="content">
        <section class="page-section">
            <div class="section-header">
                <div>
                    <h1>My calendars</h1>
                    <p class="lead-text">Create and manage event calendars for friend groups and plans.</p>
                </div>
            </div>

            <p:panel header="Create calendar" styleClass="surface-panel form-panel">
                <h:form styleClass="stacked-form">
                    <p:outputLabel for="calendarName" value="Calendar name"/>
                    <p:inputText id="calendarName"
                                 value="#{calendarListView.calendarName}"
                                 maxlength="160"
                                 required="true"
                                 requiredMessage="Calendar name is required."/>
                    <p:commandButton value="Create calendar" action="#{calendarListView.createCalendar}" ajax="false"/>
                </h:form>
            </p:panel>

            <div class="table-scroll-region" role="region" aria-label="Calendars table" tabindex="0">
            <p:dataTable value="#{calendarListView.calendarMemberships}"
                         var="calendar"
                         emptyMessage="No calendars yet."
                         styleClass="surface-table">
                <p:column headerText="Calendar">
                    <h:outputLink value="#{request.contextPath}/app/calendar">
                        #{calendar.calendarName}
                        <f:param name="id" value="#{calendar.calendarId}"/>
                    </h:outputLink>
                </p:column>
                <p:column headerText="Role">
                    <h:outputText value="#{calendar.role}"/>
                </p:column>
                <p:column headerText="Public link">
                    <h:outputText value="#{calendar.publicAccessEnabled ? 'Enabled' : 'Disabled'}"/>
                </p:column>
                <p:column headerText="Action">
                    <h:outputLink value="#{request.contextPath}/app/calendar" styleClass="button-link secondary-link">
                        Open
                        <f:param name="id" value="#{calendar.calendarId}"/>
                    </h:outputLink>
                    <h:outputLink value="#{request.contextPath}/app/calendar-settings"
                                  styleClass="button-link secondary-link"
                                  rendered="#{calendar.admin}">
                        Sharing
                        <f:param name="id" value="#{calendar.calendarId}"/>
                    </h:outputLink>
                </p:column>
            </p:dataTable>
            </div>
        </section>
    </ui:define>
</ui:composition>
