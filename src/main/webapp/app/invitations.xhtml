<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:pt="jakarta.faces.passthrough"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/main.xhtml">
    <ui:define name="title">Invitations - Shared calendar</ui:define>

    <ui:define name="content">
        <section class="page-section">
            <div class="section-header">
                <div>
                    <h1>Invitations</h1>
                    <p class="lead-text">Create single-use registration and editor links. Links expire after seven days.</p>
                </div>
            </div>

            <div class="form-grid">
                <p:panel styleClass="surface-panel form-panel" pt:aria-labelledby="registrationInvitationHeading">
                    <h2 id="registrationInvitationHeading" class="panel-heading">Registration invitation</h2>
                    <h:form styleClass="stacked-form">
                        <p:commandButton value="Generate registration link"
                                         action="#{invitationView.createRegistrationInvitation}"
                                         ajax="false"/>
                    </h:form>
                </p:panel>

                <p:panel styleClass="surface-panel form-panel" pt:aria-labelledby="editorInvitationHeading">
                    <h2 id="editorInvitationHeading" class="panel-heading">Editor invitation</h2>
                    <h:form styleClass="stacked-form" rendered="#{invitationView.hasEditableCalendars()}">
                        <p:outputLabel for="calendar" value="Calendar"/>
                        <h:selectOneMenu id="calendar"
                                         value="#{invitationView.selectedCalendarId}"
                                         required="true"
                                         requiredMessage="Calendar is required."
                                         styleClass="ui-inputfield ui-widget ui-state-default ui-corner-all">
                            <f:selectItem itemLabel="Select calendar" noSelectionOption="true"/>
                            <f:selectItems value="#{invitationView.editableCalendars}"
                                           var="calendar"
                                           itemValue="#{calendar.id}"
                                           itemLabel="#{calendar.name}"/>
                        </h:selectOneMenu>

                        <p:commandButton value="Generate editor link"
                                         action="#{invitationView.createEditorInvitation}"
                                         ajax="false"/>
                    </h:form>
                    <h:panelGroup layout="block" rendered="#{not invitationView.hasEditableCalendars()}">
                        <p>No editable calendars are available.</p>
                    </h:panelGroup>
                </p:panel>
            </div>

            <h:panelGroup layout="block"
                          styleClass="generated-invitation"
                          rendered="#{invitationView.hasGeneratedInvitationLink()}">
                <p:outputLabel for="generatedInvitationLink" value="Generated link"/>
                <div class="copy-control">
                    <p:inputText id="generatedInvitationLink"
                                 value="#{invitationView.generatedInvitationLink}"
                                 readonly="true"/>
                    <button type="button"
                            class="button-link secondary-link"
                            onclick="copyInvitationLink(this); return false;">Copy generated link</button>
                    <p class="copy-status" role="status" aria-live="polite"></p>
                </div>
                <p class="field-help">You can also select the link and copy it manually.</p>
            </h:panelGroup>

            <div class="table-scroll-region" role="region" aria-label="Invitations table" tabindex="0">
            <p:dataTable value="#{invitationView.invitations}"
                         var="invitation"
                         lazy="true"
                         paginator="true"
                         paginatorAlwaysVisible="false"
                         paginatorPosition="bottom"
                         rows="50"
                         emptyMessage="No invitations yet."
                         styleClass="surface-table">
                <p:column headerText="Invitation link">
                    <div class="copy-control">
                        <p:inputText value="#{invitation.invitationLink}"
                                     readonly="true"
                                     styleClass="table-copy-field"
                                     pt:aria-label="Invitation link for #{invitation.scope}, created #{invitation.createdAt}"/>
                        <button type="button"
                                class="button-link secondary-link"
                                aria-label="Copy invitation link for #{invitation.scope}, created #{invitation.createdAt}"
                                onclick="copyInvitationLink(this); return false;">Copy link</button>
                        <p class="copy-status" role="status" aria-live="polite"></p>
                    </div>
                </p:column>
                <p:column headerText="Scope">
                    <h:outputText value="#{invitation.scope}"/>
                </p:column>
                <p:column headerText="Status">
                    <h:outputText value="#{invitation.status}"/>
                </p:column>
                <p:column headerText="Created">
                    <h:outputText value="#{invitation.createdAt}"/>
                </p:column>
                <p:column headerText="Action">
                    <h:form rendered="#{invitation.revocable}">
                        <p:commandButton value="Revoke"
                                         action="#{invitationView.revokeInvitation(invitation.id)}"
                                         ajax="false"
                                         styleClass="ui-button-danger ui-button-outlined"
                                         pt:aria-label="Revoke invitation for #{invitation.scope}, created #{invitation.createdAt}">
                            <p:confirm header="Revoke invitation"
                                       message="Revoke this invitation permanently?"
                                       yesButtonLabel="Revoke invitation"
                                       yesButtonClass="ui-button-danger"
                                       noButtonLabel="Cancel"
                                       noButtonClass="ui-button-secondary ui-button-outlined"
                                       beforeShow="focusConfirmationCancelButton();"/>
                        </p:commandButton>
                    </h:form>
                    <h:outputText value="-" rendered="#{not invitation.revocable}"/>
                </p:column>
            </p:dataTable>
            </div>
            <p:confirmDialog global="true" closeOnEscape="true" closable="false" responsive="true">
                <p:commandButton value="Cancel"
                                 type="button"
                                 styleClass="ui-confirmdialog-no ui-button-secondary ui-button-outlined"/>
                <p:commandButton value="Confirm"
                                 type="button"
                                 styleClass="ui-confirmdialog-yes ui-button-danger"/>
            </p:confirmDialog>
        </section>
        <script type="text/javascript">
            function copyInvitationLink(button) {
                var copyControl = button.closest(".copy-control");
                var invitationLink = copyControl.querySelector("input");
                var copyStatus = copyControl.querySelector(".copy-status");

                function reportCopySuccess() {
                    copyStatus.textContent = "Link copied.";
                }

                function copyWithSelectionFallback() {
                    invitationLink.focus();
                    invitationLink.select();
                    invitationLink.setSelectionRange(0, invitationLink.value.length);
                    try {
                        if (document.execCommand("copy")) {
                            reportCopySuccess();
                            return;
                        }
                    } catch (copyFailure) {
                        copyStatus.textContent = "Clipboard access is unavailable. Select the link and copy it manually.";
                        return;
                    }
                    copyStatus.textContent = "Clipboard access is unavailable. Select the link and copy it manually.";
                }

                if (navigator.clipboard) {
                    navigator.clipboard.writeText(invitationLink.value).then(reportCopySuccess, copyWithSelectionFallback);
                    return;
                }
                copyWithSelectionFallback();
            }
        </script>
    </ui:define>
</ui:composition>
