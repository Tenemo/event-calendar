<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/admin.xhtml">
    <ui:define name="title">Users - Shared calendar</ui:define>
    <ui:define name="admin-title">Users</ui:define>

    <ui:define name="admin-content">
        <p:panel header="User management placeholder" styleClass="surface-panel">
            <p>
                User management is added after authentication, authorization, and persistence are in place.
            </p>
            <p:dataTable value="#{requestScope.emptyUserRows}" var="user" emptyMessage="No users are loaded in the foundation milestone.">
                <p:column headerText="Username"/>
                <p:column headerText="Roles"/>
                <p:column headerText="Status"/>
            </p:dataTable>
        </p:panel>
    </ui:define>
</ui:composition>
