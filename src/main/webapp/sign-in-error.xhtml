<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:pt="jakarta.faces.passthrough"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/main.xhtml">
    <ui:define name="title">Sign-in error - Shared calendar</ui:define>

    <ui:define name="content">
        <section class="narrow-section">
            <h1 id="signInErrorHeading">Sign-in error</h1>
            <p:panel styleClass="surface-panel" pt:aria-labelledby="signInErrorHeading">
                <p:staticMessage severity="warn"
                                 summary="Sign-in failed."
                                 detail="Check your username and password, then try again."/>
            </p:panel>
        </section>
    </ui:define>
</ui:composition>
