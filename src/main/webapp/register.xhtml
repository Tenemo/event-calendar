<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:pt="jakarta.faces.passthrough"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/main.xhtml">
    <f:metadata>
        <f:viewParam name="token" value="#{registrationView.invitationToken}"/>
    </f:metadata>

    <ui:define name="title">Register - Shared calendar</ui:define>

    <ui:define name="content">
        <section class="narrow-section">
            <h:panelGroup rendered="#{registrationView.signedIn}"><h1>Accept invitation</h1></h:panelGroup>
            <h:panelGroup rendered="#{not registrationView.signedIn}"><h1>Create your calendar</h1></h:panelGroup>
            <p:panel
                     styleClass="surface-panel form-panel"
                     rendered="#{registrationView.signedIn}">
                <h:form styleClass="stacked-form">
                    <h:inputHidden value="#{registrationView.invitationToken}"/>
                    <p>You are already signed in. Accept this invitation with your current account.</p>
                    <p:commandButton value="Accept invitation"
                                     action="#{registrationView.acceptInvitation}"
                                     ajax="false"/>
                </h:form>
            </p:panel>

            <p:panel
                     styleClass="surface-panel form-panel"
                     rendered="#{not registrationView.signedIn}">
                <h:form styleClass="stacked-form">
                    <h:inputHidden id="invitationToken" value="#{registrationView.invitationToken}"/>

                    <p:outputLabel for="username" value="Username"/>
                    <p:inputText id="username"
                                 value="#{registrationView.username}"
                                 autocomplete="username"
                                 pt:maxlength="80"
                                 required="true"
                                 requiredMessage="Username is required."/>

                    <p:outputLabel for="displayName" value="Display name"/>
                    <p:inputText id="displayName"
                                 value="#{registrationView.displayName}"
                                 autocomplete="name"
                                 pt:maxlength="160"
                                 required="true"
                                 requiredMessage="Display name is required."/>

                    <p:outputLabel for="calendarName" value="Calendar name"/>
                    <p:inputText id="calendarName"
                                 value="#{registrationView.calendarName}"
                                 pt:maxlength="160"
                                 required="true"
                                 requiredMessage="Calendar name is required."/>

                    <p:outputLabel for="password" value="Password"/>
                    <p:password id="password"
                                value="#{registrationView.password}"
                                autocomplete="new-password"
                                feedback="false"
                                maxlength="#{passwordService.maximumPasswordLength}"
                                required="true"
                                requiredMessage="Password is required."/>
                    <small class="field-help">Use at least 8 characters, including one uppercase letter and one digit.</small>

                    <p:commandButton value="Register" action="#{registrationView.register}" ajax="false"/>
                </h:form>
                <p class="form-footer">
                    Already registered?
                    <h:outputLink value="#{request.contextPath}/login">
                        Sign in to accept
                        <f:param name="invite" value="#{registrationView.invitationToken}"/>
                    </h:outputLink>
                </p>
            </p:panel>
        </section>
    </ui:define>
</ui:composition>
