<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                template="/WEB-INF/templates/main.xhtml">
    <ui:define name="title">Register - Shared calendar</ui:define>

    <ui:define name="content">
        <section class="narrow-section">
            <p:panel header="Create your calendar" styleClass="surface-panel form-panel">
                <p:staticMessage severity="info"
                                 summary="Registration is unavailable."
                                 detail="Calendar creation is not available yet."/>
                <h:form styleClass="stacked-form">
                    <p:outputLabel for="username" value="Username"/>
                    <p:inputText id="username" disabled="true"/>

                    <p:outputLabel for="displayName" value="Display name"/>
                    <p:inputText id="displayName" disabled="true"/>

                    <p:outputLabel for="calendarName" value="Calendar name"/>
                    <p:inputText id="calendarName" disabled="true"/>

                    <p:outputLabel for="password" value="Password"/>
                    <p:password id="password" disabled="true" feedback="false"/>

                    <p:commandButton value="Register" disabled="true"/>
                </h:form>
                <p class="form-footer">
                    Already registered?
                    <h:link outcome="/login" value="Sign in"/>
                </p>
            </p:panel>
        </section>
    </ui:define>
</ui:composition>
