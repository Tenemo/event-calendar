name: Production verification

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      expected_revision:
        description: Full 40-character revision expected in production
        required: true
        type: string
      base_url:
        description: Production base URL
        required: true
        default: https://calendar.social
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    production-verification-${{
    (github.event_name == 'deployment_status' &&
    github.event.deployment_status.state == 'success' &&
    github.event.deployment.creator.login == 'railway-app[bot]' &&
    github.event.deployment.task == 'deploy' &&
    github.event.deployment.environment == 'calendar.social / production') &&
    'automatic' || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify deployed revision
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
      github.event.deployment.creator.login == 'railway-app[bot]' &&
      github.event.deployment.task == 'deploy' &&
      github.event.deployment.environment == 'calendar.social / production')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      EXPECTED_REVISION: ${{ github.event_name == 'deployment_status' && github.event.deployment.sha || inputs.expected_revision }}
      PRODUCTION_BASE_URL: ${{ github.event_name == 'deployment_status' && 'https://calendar.social' || inputs.base_url }}

    steps:
      - name: Validate expected revision
        run: |
          if [[ ! "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Expected revision must be a full lowercase Git commit SHA."
            exit 1
          fi

      - name: Check out deployed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.EXPECTED_REVISION }}
          persist-credentials: false

      - name: Set up the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          install_args: java
          cache: true

      - name: Verify exact deployed revision and read-only routes
        run: >-
          java scripts/verify-production-deployment.java
          --base-url "$PRODUCTION_BASE_URL"
          --expected-revision "$EXPECTED_REVISION"
          --timeout-seconds 900
          --poll-interval-seconds 5
