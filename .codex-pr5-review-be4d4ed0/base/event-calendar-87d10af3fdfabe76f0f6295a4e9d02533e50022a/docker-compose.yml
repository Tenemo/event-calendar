services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${PGDATABASE:-calendar}
      POSTGRES_USER: ${PGUSER:-calendar}
      POSTGRES_PASSWORD: ${PGPASSWORD:-calendar}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - calendar_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    profiles: [application]
    image: shared-calendar:local
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 9080
      HTTPS_PORT: 9443
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-calendar}
      PGUSER: ${PGUSER:-calendar}
      PGPASSWORD: ${PGPASSWORD:-calendar}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Warsaw}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:9080}
      APP_BOOTSTRAP_INVITE_TOKEN: ${APP_BOOTSTRAP_INVITE_TOKEN:-}
    ports:
      - "${PORT:-9080}:9080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:9080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres-restore-verification:
    profiles: [restore-verification]
    image: postgres:17
    environment:
      POSTGRES_DB: calendar_restore
      POSTGRES_USER: calendar_restore
      POSTGRES_PASSWORD: calendar_restore
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_restore -d calendar_restore"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  calendar_postgres:
