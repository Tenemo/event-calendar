[tools]
java = "temurin-25.0.3+9.0.LTS"
maven = "3.9.11"

[env]
_.file = ".env"

[tasks.check-toolchain]
description = "Check local toolchain commands"
run = "java scripts/calendar-tool.java check-toolchain"

[tasks.prepare-liberty-dev]
description = "Prepare Liberty runtime resources"
run = "java scripts/calendar-tool.java prepare-liberty-dev"

[tasks.setup]
description = "Prepare local tools and Liberty runtime resources"
run = "java scripts/calendar-tool.java setup"

[tasks.db]
description = "Start the local PostgreSQL service"
run = "java scripts/calendar-tool.java db"

[tasks.dev]
description = "Start Open Liberty dev mode"
run = "java scripts/calendar-tool.java dev"

[tasks.package]
description = "Build and test the WAR"
run = "java scripts/calendar-tool.java package"

[tasks.install-playwright]
description = "Install Playwright browser binaries"
run = "java scripts/calendar-tool.java install-playwright"

[tasks.e2e]
description = "Run Playwright end-to-end tests against a running app"
run = "java scripts/calendar-tool.java e2e"

[tasks.wait-for-app]
description = "Wait for the running app health check"
run = "java scripts/calendar-tool.java wait-for-app"

[tasks.verify-local]
description = "Verify the local build, database, and running app"
run = "java scripts/calendar-tool.java verify-local"

[tasks.verify-running-app]
description = "Verify the running app and local database"
run = "java scripts/calendar-tool.java verify-running-app"

[tasks.docker-build]
description = "Build the production application image"
run = "java scripts/calendar-tool.java docker-build"

[tasks.docker-up]
description = "Build and start the production image with local PostgreSQL"
run = "java scripts/calendar-tool.java docker-up"

[tasks.backup-postgres]
description = "Create a PostgreSQL custom-format backup"
run = "java scripts/calendar-tool.java backup-postgres"

[tasks.restore-postgres]
description = "Restore a PostgreSQL backup after explicit database confirmation"
run = "java scripts/calendar-tool.java restore-postgres"

[tasks.verify-backup-restore]
description = "Verify backup and restore against a fresh temporary PostgreSQL database"
run = "java scripts/calendar-tool.java verify-backup-restore"
