[tools]
java = "temurin-25.0.3+9.0.LTS"

[env]
_.file = ".env"

[tasks.setup]
description = "Check the local toolchain"
run = "mise exec -- java scripts/calendar-tool.java setup"

[tasks.db]
description = "Start the local PostgreSQL service"
run = "mise exec -- java scripts/calendar-tool.java db"

[tasks.dev]
description = "Start Open Liberty dev mode"
run = "mise exec -- java scripts/calendar-tool.java dev"

[tasks.package]
description = "Build and test the WAR"
run = "mise exec -- java scripts/calendar-tool.java package"

[tasks.e2e]
description = "Run isolated Playwright end-to-end tests"
run = "mise exec -- java scripts/calendar-tool.java e2e"

[tasks.verify-bootstrap-registration]
description = "Verify atomic bootstrap registration against isolated PostgreSQL"
run = "mise exec -- java scripts/calendar-tool.java verify-bootstrap-registration"

[tasks.verify-local]
description = "Verify the running local app and Flyway schema"
run = "mise exec -- java scripts/calendar-tool.java verify-local"

[tasks.docker-build]
description = "Build the production application image"
run = "mise exec -- java scripts/calendar-tool.java docker-build"

[tasks.docker-up]
description = "Build and start the production image with local PostgreSQL"
run = "mise exec -- java scripts/calendar-tool.java docker-up"

[tasks.backup-postgres]
description = "Create a PostgreSQL custom-format backup"
run = "mise exec -- java scripts/calendar-tool.java backup-postgres"

[tasks.restore-postgres]
description = "Restore a PostgreSQL backup after explicit database confirmation"
run = "mise exec -- java scripts/calendar-tool.java restore-postgres"

[tasks.verify-backup-restore]
description = "Verify backup and restore against a fresh temporary PostgreSQL database"
run = "mise exec -- java scripts/calendar-tool.java verify-backup-restore"
